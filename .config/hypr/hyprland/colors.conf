# exec = export SLURP_ARGS='-d -c FFD8CBBB -b 673B2C44 -s 00000000'

general {
    col.active_border =  rgb(FFB59C) rgb({{ $black }})
    col.inactive_border = rgba(A48B8430)
}

misc {
    background_color = rgba(1A110EFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(1A110EFF)
        col.text = rgba(F1DFD9FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(F1DFD9), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(F1DFD9), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(F1DFD9), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrulev2 = bordercolor rgba(FFB59CAA) rgba(FFB59C77),pinned:1